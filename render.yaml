services:
  # ── Backend: Python bot ────────────────────────────────────
  - type: web
    name: crypto-bot-api
    runtime: python
    region: singapore
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health

    envVars:
      # ── Bybit ──────────────────────────────────────────────
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: BYBIT_TESTNET
        value: "false"

      # ── Anthropic ──────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_SPENDING_LIMIT
        value: "30"

      # ── Telegram ───────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      # ── Database ───────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false

      # ── Auth ───────────────────────────────────────────────
      - key: BOT_PIN_HASH
        sync: false

      # ── Bot config ─────────────────────────────────────────
      - key: BOT_TIMEZONE
        value: "Asia/Jakarta"
      - key: PAPER_TRADE
        value: "true"
      - key: INITIAL_CAPITAL
        value: "213"

      # ── Render billing ─────────────────────────────────────
      - key: RENDER_BILLING_DAY
        value: "1"

  # ── Frontend: React dashboard ──────────────────────────────
  - type: web
    name: crypto-bot-dashboard
    runtime: static
    region: singapore
    rootDir: frontend-v2
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false

    headers:
      - path: /*
        name: X-Robots-Tag
        value: noindex, nofollow, noarchive
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Cache-Control
        value: no-store, no-cache

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        sync: false